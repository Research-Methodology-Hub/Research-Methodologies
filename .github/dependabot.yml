version: 2
updates:
  # Frontend npm dependencies (web/)
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps into one PR to cut noise
      dev-and-minor:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: build

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
