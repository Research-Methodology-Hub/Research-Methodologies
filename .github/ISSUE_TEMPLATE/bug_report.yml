name: Bug report
description: Report something that isn't working as expected
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please search existing issues first.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area
      description: Which part? (e.g. web app, a methodology guide, CI)
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser / OS / Node version, if relevant.
    validations:
      required: false
